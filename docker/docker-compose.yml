version: "3.9"

services:
  pgvector_db:
    image: pgvector/pgvector:pg16
    container_name: hocaya_sor_pgvector
    env_file:
      - ./env/.env.postgres
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgvector_data:
